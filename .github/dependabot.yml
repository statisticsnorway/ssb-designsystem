version: 2

updates:
  - package-ecosystem: 'pnpm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'build: '

    ignore:
      - dependency-name: '@statisticsnorway/design-css'
      - dependency-name: '@statisticsnorway/design-theme'
      - dependency-name: '@statisticsnorway/design-react'

    groups:
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
      digdir:
        patterns:
          - '@digdir/*'
