name: Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'packages/**'
      - 'apps/storybook/**'
      - 'design-tokens/**'
      - 'designsystemet.config.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run React tests
        run: pnpm --filter @statisticsnorway/design-react test

      - name: Pack React package
        run: pnpm -C packages/react pack

      - name: Pack CSS package
        run: pnpm -C packages/css pack

      - name: Remove tarballs
        run: rm -f packages/react/*.tgz packages/css/*.tgz
